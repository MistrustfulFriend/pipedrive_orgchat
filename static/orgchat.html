<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Org Chart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@pipedrive/app-extensions-sdk@0/dist/index.umd.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:    #0f1629;
      --navy2:   #1a2340;
      --navy3:   #243055;
      --green:   #00e676;
      --green2:  #00c853;
      --accent:  #5c6bc0;
      --text:    #e8eaf6;
      --text2:   #90a4ae;
      --text3:   #546e7a;
      --border:  #1e2d45;
      --card:    #162033;
      --radius:  10px;
      --font:    'DM Sans', sans-serif;
      --mono:    'DM Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--navy);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--navy2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    .toolbar-logo {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-right: 4px;
    }
    .toolbar-logo svg { width: 18px; height: 18px; }
    .toolbar-logo span {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
    }
    .tb-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--navy3);
      color: var(--text2);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tb-btn:hover { background: var(--navy3); color: var(--text); border-color: var(--accent); }
    .tb-btn.active { background: var(--green); color: var(--navy); border-color: var(--green); }
    .tb-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .tb-btn.primary { background: var(--green); color: var(--navy); border-color: var(--green); font-weight: 600; }
    .tb-btn.primary:hover { background: var(--green2); }
    .tb-btn.danger { color: #ef5350; border-color: #ef5350; }
    .tb-btn.danger:hover { background: rgba(239,83,80,0.1); }
    .spacer { flex: 1; }
    .tb-mode-label {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: default;
    }
    #canvas-wrap.mode-connect { cursor: crosshair; }
    #canvas-wrap.mode-connect .node { cursor: crosshair; }
    #canvas-wrap.panning { cursor: grabbing; }

    #svg-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    #svg-layer.mode-connect { pointer-events: all; }

    #nodes-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }

    /* ── Nodes ── */
    .node {
      position: absolute;
      width: 180px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: grab;
      user-select: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .node:hover { border-color: var(--accent); box-shadow: 0 4px 24px rgba(92,107,192,0.25); }
    .node.selected { border-color: var(--green); box-shadow: 0 0 0 2px rgba(0,230,118,0.2); }
    .node.dragging { cursor: grabbing; opacity: 0.85; z-index: 100; }
    .node.placeholder { border-style: dashed; border-color: var(--text3); }
    .node.placeholder .node-dept { background: rgba(255,255,255,0.03); }
    .node.source-highlight { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,230,118,0.35); }

    .node-dept {
      padding: 5px 10px 4px;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text3);
      background: rgba(92,107,192,0.12);
      border-radius: var(--radius) var(--radius) 0 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
    }
    .node-body { padding: 10px 12px 11px; }
    .node-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--navy3);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .node-avatar.placeholder-avatar {
      background: transparent;
      border: 1px dashed var(--text3);
      color: var(--text3);
      font-size: 16px;
    }
    .node-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 2px;
    }
    .node-title {
      font-size: 11px;
      color: var(--text2);
      line-height: 1.3;
    }
    .node-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 6px;
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: var(--mono);
    }
    .node-badge.linked { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
    .node-badge.unlinked { background: rgba(255,255,255,0.05); color: var(--text3); border: 1px solid var(--border); }

    .node-actions {
      position: absolute;
      top: 6px; right: 6px;
      display: flex;
      gap: 3px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .node:hover .node-actions { opacity: 1; }
    .node-action-btn {
      width: 20px; height: 20px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--navy2);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.12s;
    }
    .node-action-btn:hover { background: var(--navy3); color: var(--text); border-color: var(--accent); }
    .node-action-btn.del:hover { color: #ef5350; border-color: #ef5350; }
    .node-action-btn svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* ── Connect port ── */
    .connect-port {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--navy2);
      border: 2px solid var(--accent);
      cursor: crosshair;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }
    .node:hover .connect-port { opacity: 1; }
    .connect-port:hover { transform: translateX(-50%) scale(1.3); background: var(--accent); }

    /* ── SVG edges ── */
    .edge { stroke: var(--text3); stroke-width: 1.5; fill: none; transition: stroke 0.15s; }
    .edge:hover { stroke: var(--accent); }
    .edge.selected-edge { stroke: var(--green); }
    .edge-del-btn { cursor: pointer; }

    /* ── Modals ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(5,10,20,0.75);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.15s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .modal {
      background: var(--navy2);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 380px;
      max-width: 95vw;
      overflow: hidden;
      animation: slideUp 0.2s ease;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .modal-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
    .modal-close {
      width: 24px; height: 24px;
      border: none;
      background: none;
      color: var(--text3);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .modal-close svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .modal-body { padding: 16px 18px; }
    .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

    .modal-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 14px;
      background: var(--navy);
      padding: 3px;
      border-radius: 8px;
    }
    .modal-tab {
      flex: 1;
      padding: 7px;
      border: none;
      background: none;
      color: var(--text3);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-tab.active { background: var(--navy3); color: var(--text); }

    .field-group { margin-bottom: 12px; }
    .field-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 5px;
      font-family: var(--mono);
    }
    .field-input {
      width: 100%;
      padding: 8px 10px;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus { border-color: var(--accent); }
    .field-input::placeholder { color: var(--text3); }

    .search-results {
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--navy);
      margin-top: -8px;
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: rgba(255,255,255,0.04); }
    .sri-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--navy3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      flex-shrink: 0;
    }
    .sri-name { font-size: 12px; font-weight: 500; color: var(--text); }
    .sri-title { font-size: 11px; color: var(--text3); }
    .search-empty { padding: 14px; text-align: center; font-size: 12px; color: var(--text3); }
    .search-loading { padding: 14px; text-align: center; font-size: 12px; color: var(--text3); }

    .btn-modal {
      padding: 8px 14px;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .btn-modal.secondary { background: var(--navy); border-color: var(--border); color: var(--text2); }
    .btn-modal.secondary:hover { color: var(--text); border-color: var(--text3); }
    .btn-modal.confirm { background: var(--green); color: var(--navy); border-color: var(--green); }
    .btn-modal.confirm:hover { background: var(--green2); }

    /* ── Status bar ── */
    .statusbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 5px 14px;
      background: var(--navy2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      flex-shrink: 0;
    }
    .statusbar-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .statusbar-dot.saving { background: #ffd740; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .save-status { margin-left: auto; }

    /* ── Empty state ── */
    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
      z-index: 0;
    }
    .empty-state svg { width: 40px; height: 40px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; }
    .empty-state h3 { font-size: 14px; font-weight: 600; color: var(--text3); }
    .empty-state p { font-size: 12px; color: var(--text3); opacity: 0.6; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="1" width="8" height="6" rx="1"/>
      <rect x="1" y="15" width="7" height="6" rx="1"/>
      <rect x="16" y="15" width="7" height="6" rx="1"/>
      <line x1="12" y1="7" x2="12" y2="11"/>
      <line x1="12" y1="11" x2="4.5" y2="15"/>
      <line x1="12" y1="11" x2="19.5" y2="15"/>
    </svg>
    <span>Org Chart</span>
  </div>
  <div class="toolbar-divider"></div>

  <button class="tb-btn" id="btn-add-person" onclick="openAddModal()">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    Add Person
  </button>

  <button class="tb-btn" id="btn-add-placeholder" onclick="addPlaceholder()">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4" stroke-dasharray="2 2"/><path d="M6 20v-2a4 4 0 014-4h4a4 4 0 014 4v2" stroke-dasharray="2 2"/></svg>
    Placeholder
  </button>

  <div class="toolbar-divider"></div>

  <button class="tb-btn" id="btn-connect" onclick="toggleConnectMode()">
    <svg viewBox="0 0 24 24"><circle cx="6" cy="12" r="3"/><circle cx="18" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="9" y1="12" x2="15" y2="6.5"/><line x1="9" y1="12" x2="15" y2="17.5"/></svg>
    Connect
  </button>

  <span class="spacer"></span>
  <span class="tb-mode-label" id="mode-label">✦ drag to move nodes</span>

  <div class="toolbar-divider"></div>

  <button class="tb-btn" onclick="zoomReset()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
    Fit
  </button>

  <button class="tb-btn primary" id="btn-save" onclick="saveChart()">
    <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save
  </button>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24"><rect x="8" y="1" width="8" height="6" rx="1"/><rect x="1" y="15" width="7" height="6" rx="1"/><rect x="16" y="15" width="7" height="6" rx="1"/><line x1="12" y1="7" x2="12" y2="11"/><line x1="12" y1="11" x2="4.5" y2="15"/><line x1="12" y1="11" x2="19.5" y2="15"/></svg>
    <h3>Your org chart is empty</h3>
    <p>Add a person or placeholder to get started</p>
  </div>

  <svg id="svg-layer" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="var(--text3)" />
      </marker>
      <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="var(--green)" />
      </marker>
    </defs>
    <g id="edges-group"></g>
    <line id="drag-edge" x1="0" y1="0" x2="0" y2="0" stroke="var(--green)" stroke-width="1.5" stroke-dasharray="5 3" fill="none" style="display:none;" marker-end="url(#arrow-green)"/>
  </svg>

  <div id="nodes-layer"></div>
</div>

<!-- Status bar -->
<div class="statusbar">
  <div class="statusbar-dot" id="status-dot"></div>
  <span id="status-text">Ready</span>
  <span class="save-status" id="save-status"></span>
</div>

<!-- Add Person Modal -->
<div class="modal-backdrop" id="modal-add" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Node</div>
      <button class="modal-close" onclick="closeModal('modal-add')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" id="tab-search" onclick="switchTab('search')">Search Pipedrive</button>
        <button class="modal-tab" id="tab-manual" onclick="switchTab('manual')">Enter manually</button>
      </div>

      <!-- Search tab -->
      <div id="tab-panel-search">
        <div class="field-group">
          <label class="field-label">Search people</label>
          <input class="field-input" id="search-input" placeholder="Type a name…" oninput="onSearchInput(this.value)" autocomplete="off" />
        </div>
        <div class="search-results" id="search-results" style="display:none;"></div>
      </div>

      <!-- Manual tab -->
      <div id="tab-panel-manual" style="display:none;">
        <div class="field-group">
          <label class="field-label">Name *</label>
          <input class="field-input" id="manual-name" placeholder="e.g. Head of Sales" />
        </div>
        <div class="field-group">
          <label class="field-label">Job Title</label>
          <input class="field-input" id="manual-title" placeholder="e.g. VP Sales" />
        </div>
        <div class="field-group">
          <label class="field-label">Department / Team</label>
          <input class="field-input" id="manual-dept" placeholder="e.g. Sales" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal secondary" onclick="closeModal('modal-add')">Cancel</button>
      <button class="btn-modal confirm" id="modal-add-confirm" onclick="confirmAdd()">Add to Chart</button>
    </div>
  </div>
</div>

<!-- Edit Node Modal -->
<div class="modal-backdrop" id="modal-edit" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Node</div>
      <button class="modal-close" onclick="closeModal('modal-edit')">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <label class="field-label">Name</label>
        <input class="field-input" id="edit-name" placeholder="Name" />
      </div>
      <div class="field-group">
        <label class="field-label">Job Title</label>
        <input class="field-input" id="edit-title" placeholder="Job Title" />
      </div>
      <div class="field-group">
        <label class="field-label">Department / Team</label>
        <input class="field-input" id="edit-dept" placeholder="Department" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal secondary" onclick="closeModal('modal-edit')">Cancel</button>
      <button class="btn-modal confirm" onclick="confirmEdit()">Save</button>
    </div>
  </div>
</div>

<script>
(async () => {
  /* ────────────────────────────────────────────────────────
     SDK + params
  ──────────────────────────────────────────────────────── */
  let sdk, companyId = "", orgId = "", orgName = "";
  try {
    sdk = await AppExtensionsSDK.initialize({ identifier: "__orgchart__" });
    const params = sdk.userIdentifier || {};
    companyId = String(params.companyId || new URLSearchParams(location.search).get("companyId") || "");
    orgId     = String(params.id        || new URLSearchParams(location.search).get("id")        || "");
    orgName   = String(params.name      || new URLSearchParams(location.search).get("name")      || "Organisation");
  } catch(e) {
    const p = new URLSearchParams(location.search);
    companyId = p.get("companyId") || "";
    orgId     = p.get("id")        || "";
    orgName   = p.get("name")      || "Organisation";
  }

  /* ────────────────────────────────────────────────────────
     State
  ──────────────────────────────────────────────────────── */
  let nodes   = {};   // id → { id, name, title, dept, pdPersonId, x, y, placeholder }
  let edges   = [];   // [ {id, from, to} ]
  let edgeIdC = 0;
  let nodeIdC = 0;
  let connectMode = false;
  let connectSource = null;
  let selectedSearchResult = null;
  let editingNodeId = null;
  let activeTab = "search";
  let dirty = false;
  let saveTimer = null;

  const canvasWrap  = document.getElementById("canvas-wrap");
  const nodesLayer  = document.getElementById("nodes-layer");
  const svgLayer    = document.getElementById("svg-layer");
  const edgesGroup  = document.getElementById("edges-group");
  const dragEdge    = document.getElementById("drag-edge");
  const emptyState  = document.getElementById("empty-state");
  const statusText  = document.getElementById("status-text");
  const saveStatus  = document.getElementById("save-status");
  const statusDot   = document.getElementById("status-dot");

  /* ────────────────────────────────────────────────────────
     Load existing chart
  ──────────────────────────────────────────────────────── */
  async function loadChart() {
    if (!orgId || !companyId) return;
    try {
      const r = await fetch(`/api/orgchart/load?orgId=${orgId}&companyId=${companyId}`);
      if (!r.ok) return;
      const d = await r.json();
      if (d.chart) {
        const c = JSON.parse(d.chart);
        nodes   = c.nodes   || {};
        edges   = c.edges   || [];
        edgeIdC = c.edgeIdC || 0;
        nodeIdC = c.nodeIdC || 0;
        renderAll();
        setStatus("Chart loaded");
      }
    } catch(e) { /* no saved chart yet */ }
  }

  /* ────────────────────────────────────────────────────────
     Render
  ──────────────────────────────────────────────────────── */
  function renderAll() {
    nodesLayer.innerHTML = "";
    edgesGroup.innerHTML = "";
    Object.values(nodes).forEach(n => createNodeEl(n));
    edges.forEach(e => createEdgeEl(e));
    updateEmpty();
  }

  function updateEmpty() {
    emptyState.style.display = Object.keys(nodes).length === 0 ? "flex" : "none";
  }

  function initials(name) {
    return (name || "?").split(" ").map(w=>w[0]||"").join("").slice(0,2).toUpperCase();
  }

  function createNodeEl(n) {
    const el = document.createElement("div");
    el.className = "node" + (n.placeholder ? " placeholder" : "");
    el.id = "node-" + n.id;
    el.style.left = (n.x || 100) + "px";
    el.style.top  = (n.y || 100) + "px";

    const deptBg = n.dept
      ? `style="background:rgba(92,107,192,0.18);color:var(--accent)"`
      : "";

    el.innerHTML = `
      <div class="node-dept" ${deptBg}>${n.dept || "—"}</div>
      <div class="node-body">
        <div class="node-avatar ${n.placeholder ? "placeholder-avatar" : ""}">${n.placeholder ? "?" : initials(n.name)}</div>
        <div class="node-name">${n.name || "Unknown"}</div>
        <div class="node-title">${n.title || ""}</div>
        <div class="node-badge ${n.pdPersonId ? "linked" : "unlinked"}">${n.pdPersonId ? "✓ linked" : "placeholder"}</div>
      </div>
      <div class="node-actions">
        <button class="node-action-btn" title="Edit" onclick="openEditModal('${n.id}')">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="node-action-btn del" title="Delete" onclick="deleteNode('${n.id}')">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
      <div class="connect-port" data-node="${n.id}" title="Drag to connect"></div>
    `;

    makeDraggable(el, n);
    setupConnectPort(el.querySelector(".connect-port"), n.id);
    nodesLayer.appendChild(el);
    return el;
  }

  function createEdgeEl(e) {
    const fromN = nodes[e.from];
    const toN   = nodes[e.to];
    if (!fromN || !toN) return;

    const [x1,y1] = nodeCenter(fromN, "bottom");
    const [x2,y2] = nodeCenter(toN,   "top");

    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("class","edge");
    path.setAttribute("id","edge-"+e.id);
    path.setAttribute("marker-end","url(#arrow)");
    path.setAttribute("d", bezierPath(x1,y1,x2,y2));
    path.addEventListener("click", () => deleteEdgeById(e.id));
    path.setAttribute("title","Click to remove");
    edgesGroup.appendChild(path);
  }

  function bezierPath(x1,y1,x2,y2) {
    const dy = Math.abs(y2-y1)*0.5;
    return `M${x1},${y1} C${x1},${y1+dy} ${x2},${y2-dy} ${x2},${y2}`;
  }

  function nodeCenter(n, side) {
    const el = document.getElementById("node-"+n.id);
    if (!el) return [n.x+90, n.y+50];
    const w = el.offsetWidth;
    const h = el.offsetHeight;
    if (side === "bottom") return [n.x + w/2, n.y + h];
    if (side === "top")    return [n.x + w/2, n.y];
    return [n.x + w/2, n.y + h/2];
  }

  function refreshEdge(nodeId) {
    edges.forEach(e => {
      if (e.from !== nodeId && e.to !== nodeId) return;
      const path = document.getElementById("edge-"+e.id);
      if (!path) return;
      const fromN = nodes[e.from];
      const toN   = nodes[e.to];
      if (!fromN || !toN) return;
      const [x1,y1] = nodeCenter(fromN,"bottom");
      const [x2,y2] = nodeCenter(toN,"top");
      path.setAttribute("d", bezierPath(x1,y1,x2,y2));
    });
  }

  /* ────────────────────────────────────────────────────────
     Drag nodes
  ──────────────────────────────────────────────────────── */
  function makeDraggable(el, n) {
    let startX, startY, startNX, startNY, dragging = false;

    el.addEventListener("mousedown", (e) => {
      if (connectMode) return;
      if (e.target.closest(".node-actions")) return;
      if (e.target.closest(".connect-port")) return;
      e.preventDefault();
      dragging = true;
      startX = e.clientX; startY = e.clientY;
      startNX = n.x; startNY = n.y;
      el.classList.add("dragging");
    });

    document.addEventListener("mousemove", (e) => {
      if (!dragging) return;
      n.x = startNX + (e.clientX - startX);
      n.y = startNY + (e.clientY - startY);
      el.style.left = n.x + "px";
      el.style.top  = n.y + "px";
      refreshEdge(n.id);
    });

    document.addEventListener("mouseup", () => {
      if (!dragging) return;
      dragging = false;
      el.classList.remove("dragging");
      markDirty();
    });
  }

  /* ────────────────────────────────────────────────────────
     Connect mode
  ──────────────────────────────────────────────────────── */
  function setupConnectPort(portEl, nodeId) {
    portEl.addEventListener("mousedown", (e) => {
      e.stopPropagation();
      e.preventDefault();
      startConnect(nodeId, e);
    });
  }

  function startConnect(nodeId, e) {
    connectSource = nodeId;
    const rect = canvasWrap.getBoundingClientRect();
    const [x1,y1] = nodeCenter(nodes[nodeId],"bottom");
    dragEdge.setAttribute("x1", x1);
    dragEdge.setAttribute("y1", y1);
    dragEdge.setAttribute("x2", e.clientX - rect.left);
    dragEdge.setAttribute("y2", e.clientY - rect.top);
    dragEdge.style.display = "block";

    document.getElementById("node-"+nodeId).classList.add("source-highlight");

    const onMove = (me) => {
      dragEdge.setAttribute("x2", me.clientX - rect.left);
      dragEdge.setAttribute("y2", me.clientY - rect.top);
    };
    const onUp = (me) => {
      dragEdge.style.display = "none";
      document.getElementById("node-"+nodeId)?.classList.remove("source-highlight");
      const target = document.elementFromPoint(me.clientX, me.clientY)?.closest(".node");
      if (target && target.id !== "node-"+nodeId) {
        const toId = target.id.replace("node-","");
        addEdge(nodeId, toId);
      }
      connectSource = null;
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
    };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  }

  function toggleConnectMode() {
    connectMode = !connectMode;
    const btn = document.getElementById("btn-connect");
    const lbl = document.getElementById("mode-label");
    btn.classList.toggle("active", connectMode);
    canvasWrap.classList.toggle("mode-connect", connectMode);
    lbl.textContent = connectMode ? "⇄ click port to start line" : "✦ drag to move nodes";
  }

  function addEdge(fromId, toId) {
    const exists = edges.find(e => e.from===fromId && e.to===toId);
    if (exists) return;
    const e = { id: ++edgeIdC, from: fromId, to: toId };
    edges.push(e);
    createEdgeEl(e);
    markDirty();
  }

  function deleteEdgeById(eid) {
    edges = edges.filter(e => e.id !== eid);
    const path = document.getElementById("edge-"+eid);
    if (path) path.remove();
    markDirty();
  }

  /* ────────────────────────────────────────────────────────
     Add node
  ──────────────────────────────────────────────────────── */
  window.openAddModal = function() {
    selectedSearchResult = null;
    document.getElementById("search-input").value = "";
    document.getElementById("search-results").style.display = "none";
    document.getElementById("search-results").innerHTML = "";
    document.getElementById("manual-name").value = "";
    document.getElementById("manual-title").value = "";
    document.getElementById("manual-dept").value = "";
    switchTab("search");
    document.getElementById("modal-add").style.display = "flex";
    setTimeout(() => document.getElementById("search-input").focus(), 50);
  };

  window.addPlaceholder = function() {
    const id = ++nodeIdC;
    const count = Object.values(nodes).filter(n=>n.placeholder).length + 1;
    const n = {
      id: String(id),
      name: `Unknown Person ${count}`,
      title: "Unknown Title",
      dept: "",
      placeholder: true,
      pdPersonId: null,
      x: 80 + Math.random()*200,
      y: 80 + Math.random()*150,
    };
    nodes[n.id] = n;
    createNodeEl(n);
    updateEmpty();
    markDirty();
  };

  window.confirmAdd = function() {
    if (activeTab === "search") {
      if (!selectedSearchResult) return;
      const id = ++nodeIdC;
      const n = {
        id: String(id),
        name: selectedSearchResult.name,
        title: selectedSearchResult.title || "",
        dept: selectedSearchResult.org_name || "",
        placeholder: false,
        pdPersonId: String(selectedSearchResult.pdId),
        x: 80 + Math.random()*300,
        y: 80 + Math.random()*200,
      };
      nodes[n.id] = n;
      createNodeEl(n);
      updateEmpty();
      markDirty();
    } else {
      const name = document.getElementById("manual-name").value.trim();
      if (!name) { document.getElementById("manual-name").focus(); return; }
      const id = ++nodeIdC;
      const n = {
        id: String(id),
        name,
        title: document.getElementById("manual-title").value.trim(),
        dept:  document.getElementById("manual-dept").value.trim(),
        placeholder: false,
        pdPersonId: null,
        x: 80 + Math.random()*300,
        y: 80 + Math.random()*200,
      };
      nodes[n.id] = n;
      createNodeEl(n);
      updateEmpty();
      markDirty();
    }
    closeModal("modal-add");
  };

  /* ────────────────────────────────────────────────────────
     Edit node
  ──────────────────────────────────────────────────────── */
  window.openEditModal = function(nodeId) {
    editingNodeId = nodeId;
    const n = nodes[nodeId];
    document.getElementById("edit-name").value  = n.name  || "";
    document.getElementById("edit-title").value = n.title || "";
    document.getElementById("edit-dept").value  = n.dept  || "";
    document.getElementById("modal-edit").style.display = "flex";
  };

  window.confirmEdit = function() {
    const n = nodes[editingNodeId];
    n.name  = document.getElementById("edit-name").value.trim()  || n.name;
    n.title = document.getElementById("edit-title").value.trim();
    n.dept  = document.getElementById("edit-dept").value.trim();
    // Re-render just that node
    const existing = document.getElementById("node-"+n.id);
    if (existing) existing.remove();
    createNodeEl(n);
    refreshEdge(n.id);
    markDirty();
    closeModal("modal-edit");
  };

  /* ────────────────────────────────────────────────────────
     Delete node
  ──────────────────────────────────────────────────────── */
  window.deleteNode = function(nodeId) {
    delete nodes[nodeId];
    const el = document.getElementById("node-"+nodeId);
    if (el) el.remove();
    // Remove connected edges
    const removed = edges.filter(e => e.from===nodeId || e.to===nodeId);
    removed.forEach(e => {
      const p = document.getElementById("edge-"+e.id);
      if (p) p.remove();
    });
    edges = edges.filter(e => e.from!==nodeId && e.to!==nodeId);
    updateEmpty();
    markDirty();
  };

  /* ────────────────────────────────────────────────────────
     Pipedrive person search
  ──────────────────────────────────────────────────────── */
  let searchDebounce;
  window.onSearchInput = function(val) {
    clearTimeout(searchDebounce);
    const el = document.getElementById("search-results");
    if (!val.trim()) { el.style.display = "none"; return; }
    el.style.display = "block";
    el.innerHTML = `<div class="search-loading">Searching…</div>`;
    searchDebounce = setTimeout(() => doSearch(val), 300);
  };

  async function doSearch(q) {
    const el = document.getElementById("search-results");
    try {
      const r = await fetch(`/api/orgchart/search?q=${encodeURIComponent(q)}&orgId=${orgId}&companyId=${companyId}`);
      const d = await r.json();
      const people = d.people || [];
      if (!people.length) {
        el.innerHTML = `<div class="search-empty">No results for "${q}"</div>`;
        return;
      }
      el.innerHTML = people.map(p => `
        <div class="search-result-item" onclick="selectPerson(${JSON.stringify(p).replace(/"/g,'&quot;')})">
          <div class="sri-avatar">${initials(p.name)}</div>
          <div>
            <div class="sri-name">${p.name}</div>
            <div class="sri-title">${p.title || p.org_name || ""}</div>
          </div>
        </div>
      `).join("");
    } catch(e) {
      el.innerHTML = `<div class="search-empty">Search unavailable</div>`;
    }
  }

  window.selectPerson = function(p) {
    selectedSearchResult = p;
    document.getElementById("search-input").value = p.name;
    document.getElementById("search-results").style.display = "none";
  };

  /* ────────────────────────────────────────────────────────
     Tabs
  ──────────────────────────────────────────────────────── */
  window.switchTab = function(tab) {
    activeTab = tab;
    document.getElementById("tab-panel-search").style.display = tab==="search" ? "block" : "none";
    document.getElementById("tab-panel-manual").style.display = tab==="manual" ? "block" : "none";
    document.getElementById("tab-search").classList.toggle("active", tab==="search");
    document.getElementById("tab-manual").classList.toggle("active", tab==="manual");
  };

  /* ────────────────────────────────────────────────────────
     Modal helpers
  ──────────────────────────────────────────────────────── */
  window.closeModal = function(id) {
    document.getElementById(id).style.display = "none";
  };
  document.querySelectorAll(".modal-backdrop").forEach(b => {
    b.addEventListener("click", (e) => { if (e.target === b) b.style.display = "none"; });
  });

  /* ────────────────────────────────────────────────────────
     Save
  ──────────────────────────────────────────────────────── */
  function markDirty() {
    dirty = true;
    saveStatus.textContent = "Unsaved changes";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(autoSave, 4000);
  }

  async function autoSave() {
    if (!dirty) return;
    await doSave();
  }

  window.saveChart = async function() {
    await doSave();
  };

  async function doSave() {
    if (!orgId || !companyId) {
      setStatus("Cannot save — no org/company context");
      return;
    }
    statusDot.classList.add("saving");
    saveStatus.textContent = "Saving…";
    try {
      const payload = {
        orgId, companyId,
        chart: JSON.stringify({ nodes, edges, edgeIdC, nodeIdC }),
      };
      const r = await fetch("/api/orgchart/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const d = await r.json();
      if (d.ok) {
        dirty = false;
        saveStatus.textContent = "Saved ✓";
        setStatus("Chart saved");
        setTimeout(() => { if (!dirty) saveStatus.textContent = ""; }, 3000);
      } else {
        saveStatus.textContent = "Save failed";
        setStatus("Save failed: " + (d.error || "unknown error"));
      }
    } catch(e) {
      saveStatus.textContent = "Save failed";
      setStatus("Network error");
    } finally {
      statusDot.classList.remove("saving");
    }
  }

  /* ────────────────────────────────────────────────────────
     Zoom / fit
  ──────────────────────────────────────────────────────── */
  window.zoomReset = function() {
    if (!Object.keys(nodes).length) return;
    const els = Object.values(nodes);
    const xs = els.map(n=>n.x), ys = els.map(n=>n.y);
    const minX = Math.min(...xs) - 40;
    const minY = Math.min(...ys) - 40;
    Object.values(nodes).forEach(n => {
      n.x -= minX;
      n.y -= minY;
      const el = document.getElementById("node-"+n.id);
      if (el) { el.style.left = n.x+"px"; el.style.top = n.y+"px"; }
    });
    edges.forEach(e => refreshEdge(e.from));
  };

  /* ────────────────────────────────────────────────────────
     Status
  ──────────────────────────────────────────────────────── */
  function setStatus(msg) {
    statusText.textContent = msg;
  }

  /* ────────────────────────────────────────────────────────
     Init
  ──────────────────────────────────────────────────────── */
  setStatus(orgName ? `Org: ${orgName}` : "Ready");
  await loadChart();

})();
</script>
</body>
</html>
